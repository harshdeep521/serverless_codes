name: Serverless CI/CD Deployment

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    name: Deploy Serverless App
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18]

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Run tests (optional but recommended)
      - name: Run Tests
        run: npm test

      # 5. Install Serverless globally
      - name: Install Serverless Framework
        run: npm install -g serverless

      # 6. Set environment (dev / prod)
      - name: Set Deployment Stage
        id: set-stage
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "STAGE=prod" >> $GITHUB_ENV
          else
            echo "STAGE=dev" >> $GITHUB_ENV
          fi

      # 7. Deploy using Serverless
      - name: Deploy to AWS
        run: serverless deploy --stage $STAGE
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 8. Optional: Print success message
      - name: Deployment Success
        run: echo "Deployment completed successfully 🚀"
